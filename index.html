<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controlo de Diárias Pro</title>
    
    <link rel="stylesheet" href="css/global.css?v=11">
    <link rel="stylesheet" href="css/layout.css?v=11">
    <link rel="stylesheet" href="css/components.css?v=11">
</head>
<body>

    <div class="app-container">
        <nav id="main-nav" class="app-nav">
            <div class="nav-brand">
                <span class="brand-icon">💠</span>
                <span class="brand-text">Diárias Pro</span>
            </div>
            
            <div class="nav-menu">
                <button onclick="app.navigate('calendar')" class="nav-item active" id="nav-calendar">
                    <span class="nav-icon">📅</span> <span class="nav-text">Calendário</span>
                </button>
                <button onclick="app.navigate('list')" class="nav-item" id="nav-list">
                    <span class="nav-icon">💼</span> <span class="nav-text">Lista e PDF</span>
                </button>
                <button onclick="app.navigate('dashboard')" class="nav-item" id="nav-dashboard">
                    <span class="nav-icon">📊</span> <span class="nav-text">Estatísticas</span>
                </button>
                <button onclick="app.navigate('settings')" class="nav-item" id="nav-settings">
                    <span class="nav-icon">⚙️</span> <span class="nav-text">Definições</span>
                </button>
            </div>
        </nav>

        <div class="main-wrapper">
            <header id="main-header">
                <div class="header-content">
                    <div class="summary-card">
                        <small>Saldo Líquido • <span id="header-month-label">A carregar...</span></small>
                        <h2 id="total-profit">R$ 0,00</h2>
                    </div>
                    <div class="header-details">
                        <span class="detail-green">⬆ <span id="total-income">R$ 0,00</span></span>
                        <span class="detail-red">⬇ <span id="total-expenses">R$ 0,00</span></span>
                    </div>
                    <div class="header-stats-row" id="header-stats-badges">
                        </div>
                </div>
            </header>

            <main id="app-content"></main>
        </div>
    </div>

    <div id="modal-container" class="modal hidden"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script src="js/storage.js?v=11"></script>
    <script src="js/ui.js?v=11"></script>
    <script src="js/modules.js?v=11"></script>
    <script src="js/core.js?v=11"></script>
    <script src="js/main.js?v=11"></script>
</body>
</html>
